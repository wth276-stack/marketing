<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#c96b8a">
  <title>Jessi Beauty · Reels 拍片工作室</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="assets/jessi-auth.css?v=20260627a">
  <script src="assets/jessi-auth-config.js?v=20260627a"></script>
  <script src="assets/jessi-auth.js?v=20260627a"></script>
  <style>
    :root {
      --rose: #c96b8a;
      --ink: #2b2230;
      --muted: #7a6f7a;
      --paper: #fff5f8;
      --panel: #ffffff;
      --line: #ead9e2;
      --accent: #c96b8a;
      --shadow: 0 18px 48px rgba(43, 34, 48, .12);
      --radius: 10px;
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: var(--paper); }
    .app-shell { display: grid; grid-template-columns: 280px minmax(0, 1fr); min-height: 100vh; }
    #reel-list { padding: 16px; border-right: 1px solid var(--line); }
    .reel-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
    .reel-item.active { background: #fdeaf1; border-color: var(--rose); }
    .main { padding: 20px 24px; }
    #privacy { background: #fff3cd; color: #7a5b00; padding: 8px 14px; border-radius: 8px; font-size: 13px; }
    .tabs { display: flex; gap: 8px; margin: 14px 0; }
    .tab-btn { padding: 8px 14px; border: 1px solid var(--line); background: var(--panel); border-radius: 8px; cursor: pointer; }
    .tab-btn.active { background: var(--rose); color: #fff; border-color: var(--rose); }
    .panel { display: none; }
    .panel.active { display: block; }
    .field { margin: 10px 0; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .field input, .field select, .field textarea { width: 100%; padding: 8px; border: 1px solid var(--line); border-radius: 8px; font: inherit; }
    .seg-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 70px 1fr auto; gap: 6px; margin: 6px 0; }
    .seg-row input { padding: 6px; border: 1px solid var(--line); border-radius: 6px; font: inherit; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
    .toolbar button, .toolbar label { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--rose); background: var(--panel); cursor: pointer; font: inherit; }
    .toolbar button.primary { background: var(--rose); color: #fff; }
    .progress { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin: 10px 0; }
    .progress > div { height: 100%; background: var(--rose); }
    .weak { color: #c0392b; font-weight: 700; }
    @media (max-width: 720px) {
      .app-shell { grid-template-columns: 1fr; }
      #reel-list { border-right: 0; border-bottom: 1px solid var(--line); }
    }
    #ai-settings { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); }
    #ai-settings > summary { padding: 8px 12px; cursor: pointer; font-weight: 700; list-style: none; }
    #ai-settings > summary::before { content: "⚙️ "; }
    .ai-settings-body { padding: 8px 12px 12px; border-top: 1px solid var(--line); }
    .ai-note { font-size: 12px; color: #7a5b00; background: #fff3cd; padding: 6px 8px; border-radius: 6px; margin: 6px 0; }
    .ai-block { border: 1px solid var(--line); border-radius: 10px; padding: 12px; margin-bottom: 14px; background: #fff8fb; }
    .ai-pick-group { margin: 10px 0; }
    .ai-pick-group h4 { margin: 6px 0; font-size: 14px; }
    .ai-pick-card { border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; margin: 6px 0; cursor: pointer; background: var(--panel); }
    .ai-pick-card.selected { border-color: var(--rose); background: #fdeaf1; }
    .ai-pick-card .reason { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .ai-busy { opacity: .6; pointer-events: none; }
    #p-caption { width: 100%; min-height: 120px; font: inherit; resize: vertical; box-sizing: border-box; }
    .caption-tools { display: flex; gap: 8px; margin: 6px 0; }
    .caption-tools button { padding: 6px 12px; }
    #p-script { width: 100%; min-height: 240px; font: inherit; resize: vertical; box-sizing: border-box; }
    .script-tools { display: flex; gap: 8px; margin: 6px 0; flex-wrap: wrap; }
    .script-tools button { padding: 6px 12px; }
    .wizard-step { display: none; }
    .wizard[data-step="1"] .wizard-step[data-step-n="1"],
    .wizard[data-step="2"] .wizard-step[data-step-n="2"],
    .wizard[data-step="3"] .wizard-step[data-step-n="3"] { display: block; }
    .wizard-dots { display: flex; gap: 8px; margin: 8px 0; }
    .wizard-dot { width: 24px; height: 24px; border-radius: 50%; background: var(--line); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; }
    .wizard-dot.active { background: var(--accent); }
    .wizard-nav { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; align-items: center; }
  </style>
</head>
<body>
  <p id="privacy">⚠️ 私隱提醒：唔好輸入客人全名、電話、完整對話或相片。</p>
  <div class="app-shell">
    <aside id="reel-list">
      <div class="toolbar">
        <button type="button" class="primary" id="new-reel">+ 新增 Reel</button>
        <button type="button" id="duplicate-reel">複製</button>
        <button type="button" id="delete-reel">刪除</button>
      </div>
      <div id="reel-items"></div>
    </aside>
    <main class="main">
      <div id="reel-toolbar" class="toolbar">
        <button type="button" id="import-theme">從今週主題帶入</button>
        <button type="button" class="primary" id="copy-ai-brief">複製 AI 拍片 brief</button>
        <button type="button" id="export-json">匯出 JSON</button>
        <label>匯入 JSON <input type="file" id="import-json" accept=".json" hidden></label>
          <details id="ai-settings">
            <summary>AI 設定</summary>
            <div class="ai-settings-body">
              <p class="ai-note">API key 只存本機瀏覽器，只會直接傳去 Google Gemini API。</p>
              <div class="field"><label>Gemini API key</label><input type="password" id="ai-api-key" placeholder="AIza..."></div>
              <div class="field"><label>模型</label>
                <select id="ai-model">
                  <option value="gemini-2.5-flash" selected>gemini-2.5-flash（快、免費額）</option>
                  <option value="gemini-2.5-pro">gemini-2.5-pro</option>
                  <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                </select>
              </div>
              <button type="button" id="ai-save-config">儲存設定</button>
            </div>
          </details>
      </div>
      <div class="tabs">
        <button type="button" class="tab-btn active" data-tab="plan-panel">策劃</button>
        <button type="button" class="tab-btn" data-tab="shoot-panel">拍攝日</button>
        <button type="button" class="tab-btn" data-tab="review-panel">復盤</button>
      </div>
      <section id="plan-panel" class="panel active"></section>
      <section id="shoot-panel" class="panel"></section>
      <section id="review-panel" class="panel"></section>
    </main>
  </div>
  <script>
    const STORAGE = "jessi-reels-studio-v1";
    const SHARED_CONTEXT_KEY = "jessi-shared-context";
    const SCHEMA_VERSION = 1;
    const CONFIG_KEY = "jessi-reels-gemini-config";
    const GEMINI_ENDPOINT = "https://generativelanguage.googleapis.com/v1beta/models/";
    const DEFAULT_MODEL = "gemini-2.5-flash";
    const STRUCTURES = ["反差型", "清單型", "結果先行型", "問題解答型", "拆解型", "錯誤型"];
    const SCORE_KEYS = ["hook", "retention", "rhythm", "subtitle", "audio", "ctaClarity", "shareability"];
    const SCORE_LABELS = {
      hook: "頭 2 秒留人", retention: "整體留存", rhythm: "節奏密度",
      subtitle: "字幕清晰", audio: "收音質素", ctaClarity: "CTA 清晰", shareability: "save/share 價值"
    };
    const CHECKLIST_KEYS = [
      "hook2s", "oneMessage", "vertical916", "centerSubject", "shortShots",
      "clearAudio", "subtitle", "trimDead", "musicLicense", "lengthFit",
      "remember1", "remember2", "remember3", "remember4", "remember5", "remember6", "remember7",
      "structIntro", "structBody", "structEnd"
    ];
    const CHECKLIST_LABELS = {
      hook2s: "頭 1–2 秒有鉤子",
      oneMessage: "一條片只講一個重點",
      vertical916: "9:16 直片拍攝",
      centerSubject: "人/字/重點畫面放中間",
      shortShots: "拍多啲短鏡頭（0.5–2 秒）",
      clearAudio: "聲音要清過畫面",
      subtitle: "一定要落字幕",
      trimDead: "剪走所有「等」嘅位",
      musicLicense: "音樂要睇 license（唔好亂用熱門歌）",
      lengthFit: "片長冇廢話最好",
      remember1: "開頭 2 秒要有鉤子",
      remember2: "一條片只講一件事",
      remember3: "9:16 直拍，主體放中間",
      remember4: "剪走廢位，節奏要密",
      remember5: "字幕一定要清楚",
      remember6: "商業內容音樂要睇 license",
      remember7: "每週固定測試 hook/片長/封面/caption/發布時間",
      structIntro: "開頭鉤子已寫",
      structBody: "3 個段落已填",
      structEnd: "總結 + CTA 已填"
    };
    const TECHNIQUE_KEYS = CHECKLIST_KEYS.slice(0, 10);
    const REMEMBER_KEYS = CHECKLIST_KEYS.slice(10, 17);
    const STRUCT_KEYS = CHECKLIST_KEYS.slice(17);

    function uid() {
      return "r_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    function newReel() {
      const now = new Date().toISOString();
      const reel = {
        id: uid(),
        createdAt: now,
        updatedAt: now,
        status: "planning",
        title: "",
        structure: "反差型",
        hook: "",
        coreMessage: "",
        segments: [{ label: "", shot: "", voiceover: "", subtitle: "", durationSec: 0, note: "" }],
        summary: "",
        cta: "",
        caption: "",
        hashtags: [],
        coverText: "",
        checklist: {},
        score: {},
        scoreNotes: "",
        publishedAt: null,
        aiOptions: null,
        aiPicks: { structureAngle: null, lengthStyle: null, ctaStyle: null, broll: null },
        aiGeneratedAt: null,
        scriptText: "",
        wizardStep: 1
      };
      for (const k of CHECKLIST_KEYS) reel.checklist[k] = false;
      for (const k of SCORE_KEYS) reel.score[k] = 0;
      return reel;
    }

    function normalize(state) {
      if (!state || typeof state !== "object") state = { reels: [], activeReelId: null };
      if (!Array.isArray(state.reels)) state.reels = [];
      state.reels = state.reels.map((r) => {
        const base = newReel();
        const merged = { ...base, ...r };
        merged.checklist = { ...base.checklist, ...(r.checklist || {}) };
        merged.score = { ...base.score, ...(r.score || {}) };
        if (!Array.isArray(merged.segments) || !merged.segments.length) {
          merged.segments = [{ label: "", shot: "", voiceover: "", subtitle: "", durationSec: 0, note: "" }];
        }
        merged.segments = merged.segments.map((s) => ({
          label: s.label || "",
          shot: s.shot || "",
          voiceover: s.voiceover || "",
          subtitle: s.subtitle || "",
          durationSec: Number(s.durationSec) || 0,
          note: s.note || ""
        }));
        if (!Array.isArray(merged.hashtags)) merged.hashtags = [];
        if (!merged.aiPicks || typeof merged.aiPicks !== "object") {
          merged.aiPicks = { structureAngle: null, lengthStyle: null, ctaStyle: null, broll: null };
        }
        if (r.wizardStep === undefined) {
          if (merged.aiGeneratedAt) merged.wizardStep = 3;
          else if (merged.aiOptions) merged.wizardStep = 2;
          else merged.wizardStep = 1;
        }
        return merged;
      });
      if (state.activeReelId && !state.reels.find((r) => r.id === state.activeReelId)) {
        state.activeReelId = state.reels[0]?.id || null;
      }
      if (!state.activeReelId && state.reels.length) state.activeReelId = state.reels[0].id;
      return state;
    }

    function loadReels() {
      try {
        return normalize(JSON.parse(localStorage.getItem(STORAGE) || "{}"));
      } catch {
        return normalize({});
      }
    }

    function saveReels(state) {
      localStorage.setItem(STORAGE, JSON.stringify(state));
    }

    let state = loadReels();

    function activeReel() {
      return state.reels.find((r) => r.id === state.activeReelId) || null;
    }

    function addReel() {
      const reel = newReel();
      state.reels.push(reel);
      state.activeReelId = reel.id;
      saveReels(state);
      renderReelList();
      renderPlan();
      renderShootChecklist();
      renderReview();
    }

    function renderReelList() {
      const box = document.getElementById("reel-items");
      if (!state.reels.length) {
        box.innerHTML = '<p style="color:#7a6f7a;font-size:13px">未有 Reel，撳「+ 新增 Reel」開始。</p>';
        return;
      }
      box.innerHTML = state.reels
        .map(
          (r) =>
            `<div class="reel-item${r.id === state.activeReelId ? " active" : ""}" data-id="${r.id}">` +
            `<div style="font-weight:700">${escapeHtml(r.title || "（未命名）")}</div>` +
            `<div style="font-size:12px;color:#7a6f7a">${r.structure} · ${r.status}</div>` +
            `</div>`
        )
        .join("");
      box.querySelectorAll(".reel-item").forEach((el) => {
        el.addEventListener("click", () => {
          state.activeReelId = el.dataset.id;
          saveReels(state);
          renderReelList();
          renderPlan();
          renderShootChecklist();
          renderReview();
        });
      });
    }

    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function loadAiConfig() {
      try {
        const c = JSON.parse(localStorage.getItem(CONFIG_KEY) || "{}");
        return { apiKey: c.apiKey || "", model: c.model || DEFAULT_MODEL };
      } catch {
        return { apiKey: "", model: DEFAULT_MODEL };
      }
    }

    function saveAiConfig(cfg) {
      localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
    }

    async function callGemini(promptText, responseSchema) {
      const cfg = loadAiConfig();
      if (!cfg.apiKey) throw { type: "no-key" };
      const url = GEMINI_ENDPOINT + encodeURIComponent(cfg.model) + ":generateContent?key=" + encodeURIComponent(cfg.apiKey);
      const body = { contents: [{ parts: [{ text: promptText }] }], generationConfig: { responseMimeType: "application/json" } };
      if (responseSchema) body.generationConfig.responseSchema = responseSchema;
      let resp;
      try {
        resp = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      } catch {
        throw { type: "network" };
      }
      if (resp.status === 401 || resp.status === 403) throw { type: "auth" };
      if (resp.status === 429) throw { type: "quota" };
      if (!resp.ok) throw { type: "network" };
      let data;
      try { data = await resp.json(); } catch { throw { type: "network" }; }
      const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
      try { return JSON.parse(raw); } catch { throw { type: "parse", raw }; }
    }

    function handleAiError(e) {
      if (e && e.type === "no-key") {
        const d = document.getElementById("ai-settings"); if (d) d.open = true;
        const k = document.getElementById("ai-api-key"); if (k) k.focus();
        alert("請先喺「AI 設定」輸入 Gemini API key。");
        return;
      }
      if (e && e.type === "auth") {
        const d = document.getElementById("ai-settings"); if (d) d.open = true;
        alert("API key 無效，請去「AI 設定」檢查。");
        return;
      }
      if (e && e.type === "quota") { alert("額度用盡或太頻繁，稍後再試。"); return; }
      if (e && e.type === "network") { alert("連唔到 Gemini，check 網絡。"); return; }
      if (e && e.type === "parse") { alert("Gemini 回應格式異常，請再試。"); console.warn("Gemini raw:", e.raw); return; }
      alert("發生未知錯誤。");
    }

    const AI_GROUP_ARRAY = {
      structureAngle: "structureAngles",
      lengthStyle: "lengthStyles",
      ctaStyle: "ctaStyles",
      broll: "brollSets"
    };

    const STAGE_A_SCHEMA = {
      type: "object",
      properties: {
        structureAngles: { type: "array", items: { type: "object", properties: { structure: { type: "string" }, angle: { type: "string" }, reason: { type: "string" } }, required: ["structure", "angle", "reason"] } },
        lengthStyles: { type: "array", items: { type: "object", properties: { lengthSec: { type: "integer" }, subtitleStyle: { type: "string" }, reason: { type: "string" } }, required: ["lengthSec", "subtitleStyle", "reason"] } },
        ctaStyles: { type: "array", items: { type: "object", properties: { style: { type: "string" }, exampleRead: { type: "string" }, reason: { type: "string" } }, required: ["style", "exampleRead", "reason"] } },
        brollSets: { type: "array", items: { type: "object", properties: { shots: { type: "array", items: { type: "string" } }, reason: { type: "string" } }, required: ["shots", "reason"] } }
      },
      required: ["structureAngles", "lengthStyles", "ctaStyles", "brollSets"]
    };

    function stageAPrompt(r) {
      return [
        "你是香港美容業 IG Reels 編導。根據以下輸入，為每個創作維度各出 2 至 3 個候選選項，每項附一句簡短 reason。繁體中文。",
        "輸入：",
        "主題：" + r.title,
        "鉤子：" + r.hook,
        "重點：" + r.coreMessage,
        "CTA：" + r.cta,
        "",
        "輸出 JSON：structureAngles（結構+內容角度，structure 可選：反差型/清單型/結果先行型/問題解答型/拆解型/錯誤型）、lengthStyles（片長秒數 lengthSec + 字幕風格 subtitleStyle）、ctaStyles（CTA 呈現方式 style + 示範讀法 exampleRead）、brollSets（B-roll 鏡頭清單 shots）。每組 2–3 個。嚴格跟 JSON schema。"
      ].join("\n");
    }

    async function generateAiOptions() {
      const r = activeReel();
      if (!r) { alert("請先新增或揀選一條 Reel。"); return; }
      if (!r.title.trim() || !r.hook.trim() || !r.coreMessage.trim() || !r.cta.trim()) {
        alert("請先填齊主題、鉤子、重點、CTA 四格，再生成選項。");
        return;
      }
      const btn = document.getElementById("ai-generate-options");
      if (btn) { btn.disabled = true; btn.textContent = "生成中…"; }
      try {
        const data = await callGemini(stageAPrompt(r), STAGE_A_SCHEMA);
        r.aiOptions = data;
        r.aiPicks = { structureAngle: null, lengthStyle: null, ctaStyle: null, broll: null };
        r.updatedAt = new Date().toISOString();
        saveReels(state);
        renderPlan();
      } catch (e) {
        handleAiError(e);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = (activeReel()?.aiOptions ? "重新生成選項" : "AI 生成選項"); }
      }
    }

    function renderAiOptions() {
      const box = document.getElementById("ai-picks");
      if (!box) return;
      const r = activeReel();
      if (!r || !r.aiOptions) {
        box.innerHTML = '<p style="color:#7a6f7a;font-size:13px">填好上面四格，撳「AI 生成選項」由 AI 出創作選項俾你揀。</p>';
        return;
      }
      const o = r.aiOptions;
      const picks = r.aiPicks || {};
      const group = (title, items, key, card) =>
        `<div class="ai-pick-group"><h4>${title}</h4>` +
        (Array.isArray(items) ? items : []).map((item, i) => {
          const sel = JSON.stringify(picks[key]) === JSON.stringify(item);
          return `<div class="ai-pick-card${sel ? " selected" : ""}" data-group="${key}" data-i="${i}">${card(item)}</div>`;
        }).join("") + `</div>`;
      const html =
        group("結構 + 內容角度", o.structureAngles, "structureAngle", (x) => `<strong>${escapeHtml(x.structure)} · ${escapeHtml(x.angle)}</strong><div class="reason">${escapeHtml(x.reason)}</div>`) +
        group("片長 + 字幕風格", o.lengthStyles, "lengthStyle", (x) => `<strong>${Number(x.lengthSec) || 0}秒 · ${escapeHtml(x.subtitleStyle)}</strong><div class="reason">${escapeHtml(x.reason)}</div>`) +
        group("CTA 呈現方式", o.ctaStyles, "ctaStyle", (x) => `<strong>${escapeHtml(x.style)}</strong> — 「${escapeHtml(x.exampleRead)}」<div class="reason">${escapeHtml(x.reason)}</div>`) +
        group("B-roll 拍攝元素", o.brollSets, "broll", (x) => `<strong>${(x.shots || []).map(escapeHtml).join("、")}</strong><div class="reason">${escapeHtml(x.reason)}</div>`);
      box.innerHTML = html;
      box.querySelectorAll(".ai-pick-card").forEach((card) => {
        card.addEventListener("click", () => {
          const r2 = activeReel();
          if (!r2 || !r2.aiOptions) return;
          const g = card.dataset.group;
          const i = Number(card.dataset.i);
          const arr = r2.aiOptions[AI_GROUP_ARRAY[g]];
          if (!arr || !arr[i]) return;
          r2.aiPicks = r2.aiPicks || { structureAngle: null, lengthStyle: null, ctaStyle: null, broll: null };
          r2.aiPicks[g] = arr[i];
          r2.updatedAt = new Date().toISOString();
          saveReels(state);
          renderAiOptions();
        });
      });
    }

    const STAGE_B_SCHEMA = {
      type: "object",
      properties: {
        segments: { type: "array", items: { type: "object", properties: { label: { type: "string" }, shot: { type: "string" }, voiceover: { type: "string" }, subtitle: { type: "string" }, durationSec: { type: "integer" } }, required: ["label", "shot", "voiceover", "subtitle", "durationSec"] } },
        summary: { type: "string" },
        caption: { type: "string" },
        hashtags: { type: "array", items: { type: "string" } },
        coverText: { type: "string" }
      },
      required: ["segments", "summary", "caption", "hashtags", "coverText"]
    };

    function stageBPrompt(r) {
      const p = r.aiPicks || {};
      const fmt = (obj) => (obj ? JSON.stringify(obj) : "（未揀）");
      return [
        "你是香港美容業 IG Reels 編導。根據以下輸入同已揀嘅創作選項，輸出完整可拍內容。繁體中文。",
        "輸入：",
        "主題：" + r.title,
        "鉤子：" + r.hook,
        "重點：" + r.coreMessage,
        "CTA：" + r.cta,
        "已揀結構+角度：" + fmt(p.structureAngle),
        "已揀片長+字幕風格：" + fmt(p.lengthStyle),
        "已揀 CTA 呈現：" + fmt(p.ctaStyle),
        "已揀 B-roll：" + fmt(p.broll),
        "",
        "輸出 JSON：segments（逐鏡：label/shot 畫面/voiceover 旁白/subtitle 字幕/durationSec 秒數）、summary 一句總結、caption 成段完整 IG post caption（首行 hook + 內文 + CTA + hashtag 整合，可多行）、hashtags 3–8 個、coverText 封面大字。",
        "要求：節奏密、鏡頭 0.5–2 秒、字幕短句分行、9:16 直拍主體放中間、旁白口語化。嚴格跟 JSON schema。"
      ].join("\n");
    }

    async function generateAiContent() {
      const r = activeReel();
      if (!r) { alert("請先新增或揀選一條 Reel。"); return; }
      const p = r.aiPicks || {};
      if (!p.structureAngle || !p.lengthStyle || !p.ctaStyle || !p.broll) {
        alert("先揀齊四組選項（結構+角度、片長+字幕風格、CTA 呈現、B-roll），再生成完整內容。");
        return;
      }
      const btn = document.getElementById("ai-generate-content");
      if (btn) { btn.disabled = true; btn.textContent = "生成中…"; }
      try {
        const data = await callGemini(stageBPrompt(r), STAGE_B_SCHEMA);
        r.segments = (Array.isArray(data.segments) ? data.segments : []).map((s) => ({
          label: s.label || "",
          shot: s.shot || "",
          voiceover: s.voiceover || "",
          subtitle: s.subtitle || "",
          durationSec: Number(s.durationSec) || 0,
          note: ""
        }));
        if (!r.segments.length) r.segments.push({ label: "", shot: "", voiceover: "", subtitle: "", durationSec: 0, note: "" });
        r.summary = data.summary || "";
        r.caption = data.caption || "";
        r.hashtags = Array.isArray(data.hashtags) ? data.hashtags : [];
        r.coverText = data.coverText || "";
        if (p.structureAngle && p.structureAngle.structure) r.structure = p.structureAngle.structure;
        r.aiGeneratedAt = new Date().toISOString();
        r.updatedAt = r.aiGeneratedAt;
        assembleScript(true);
        saveReels(state);
        renderReelList();
        renderPlan();
        alert("已生成完整內容，可喺下面欄位微調。");
      } catch (e) {
        handleAiError(e);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = "生成完整內容"; }
      }
    }

    function regenerateOptions() {
      const r = activeReel();
      if (!r) return;
      if (r.aiOptions && !confirm("重新生成會拎走現有揀揀，繼續？")) return;
      generateAiOptions();
    }

    function regenerateContent() {
      const r = activeReel();
      if (!r) return;
      if (r.aiGeneratedAt && !confirm("重新生成會覆寫現有逐鏡/caption/hashtag/封面，繼續？")) return;
      generateAiContent();
    }

    function assembleCaption() {
      const r = activeReel();
      if (!r) { alert("請先新增或揀選一條 Reel。"); return; }
      if (r.caption && r.caption.trim() && !confirm("現有 caption 會被覆寫，繼續？")) return;
      const parts = [
        r.hook || "",
        r.summary || r.coreMessage || "",
        r.cta || "",
        (Array.isArray(r.hashtags) ? r.hashtags : []).join(" ")
      ].filter((s) => s && s.trim());
      r.caption = parts.join("\n\n");
      r.updatedAt = new Date().toISOString();
      saveReels(state);
      renderPlan();
    }

    function copyCaption() {
      const r = activeReel();
      if (!r) { alert("請先新增或揀選一條 Reel。"); return; }
      if (!r.caption || !r.caption.trim()) { alert("caption 係空，無嘢可複製。"); return; }
      const btn = document.getElementById("copy-caption");
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(r.caption).then(() => {
          if (btn) { const old = btn.textContent; btn.textContent = "已複製 ✓"; setTimeout(() => { btn.textContent = old; }, 1500); }
        }).catch(() => { alert("複製失敗，請手動選取複製。"); });
      } else {
        alert("此瀏覽器唔支援自動複製，請手動選取複製。");
      }
    }

    function assembleScript(force = false) {
      const r = activeReel();
      if (!r) { alert("請先新增或揀選一條 Reel。"); return; }
      if (!force && r.scriptText && r.scriptText.trim() && !confirm("現有腳本會被覆寫，繼續？")) return;
      const segs = (Array.isArray(r.segments) ? r.segments : []).map((s, i) =>
        `Step ${i + 1}：${s.label || "（段落）"}\n  畫面：${s.shot || ""}\n  旁白：${s.voiceover || ""}\n  字幕：${s.subtitle || ""}\n  時長：${Number(s.durationSec) || 0}秒`
      ).join("\n\n");
      const lines = [
        `【Reels 腳本 — ${r.title || "（待填）"}】`,
        "",
        "拍攝清單（逐鏡）：",
        segs || "（待填）",
        "",
        "總結：" + (r.summary || "（待填）"),
        "CTA：" + (r.cta || "（待填）"),
        "",
        "完整 caption：",
        r.caption || "（待填）",
        "",
        "hashtag：" + (Array.isArray(r.hashtags) && r.hashtags.length ? r.hashtags.join(" ") : "（待填）"),
        "封面大字：" + (r.coverText || "（待填）")
      ];
      r.scriptText = lines.join("\n");
      r.updatedAt = new Date().toISOString();
      saveReels(state);
      renderPlan();
    }

    function copyScript() {
      const r = activeReel();
      if (!r) { alert("請先新增或揀選一條 Reel。"); return; }
      if (!r.scriptText || !r.scriptText.trim()) { alert("腳本係空，無嘢可複製。"); return; }
      const btn = document.getElementById("copy-script");
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(r.scriptText).then(() => {
          if (btn) { const old = btn.textContent; btn.textContent = "已複製 ✓"; setTimeout(() => { btn.textContent = old; }, 1500); }
        }).catch(() => { alert("複製失敗，請手動選取複製。"); });
      } else {
        alert("此瀏覽器唔支援自動複製，請手動選取複製。");
      }
    }

    function canAdvanceToStep2(r) {
      return !!(r.title.trim() && r.hook.trim() && r.coreMessage.trim() && r.cta.trim());
    }

    function canAdvanceToStep3(r) {
      const p = r.aiPicks || {};
      return !!(p.structureAngle && p.lengthStyle && p.ctaStyle && p.broll);
    }

    function goWizardStep(n) {
      const r = activeReel();
      if (!r) return;
      n = Math.max(1, Math.min(3, n));
      r.wizardStep = n;
      r.updatedAt = new Date().toISOString();
      saveReels(state);
      renderPlan();
    }

    function renderPlan() {
      const panel = document.getElementById("plan-panel");
      const r = activeReel();
      if (!r) {
        panel.innerHTML = '<p style="color:#7a6f7a">請先新增或揀選一條 Reel。</p>';
        return;
      }
      const segs = r.segments
        .map(
          (s, i) =>
            `<div class="seg-row" data-i="${i}">
              <input class="seg-label" placeholder="段落標題" value="${escapeHtml(s.label)}">
              <input class="seg-shot" placeholder="畫面" value="${escapeHtml(s.shot)}">
              <input class="seg-voice" placeholder="旁白" value="${escapeHtml(s.voiceover || "")}">
              <input class="seg-sub" placeholder="字幕" value="${escapeHtml(s.subtitle || "")}">
              <input class="seg-dur" type="number" min="0" placeholder="秒" value="${s.durationSec || 0}">
              <input class="seg-note" placeholder="備註" value="${escapeHtml(s.note)}">
              <button type="button" class="seg-del">✕</button>
            </div>`
        )
        .join("");
      const step = r.wizardStep || 1;
      const dot = (n) => `<span class="wizard-dot${step === n ? " active" : ""}" data-go="${n}">${n}</span>`;
      panel.innerHTML = `
        <div class="wizard" data-step="${step}">
          <div class="wizard-dots">${dot(1)}${dot(2)}${dot(3)}</div>
          <div class="wizard-step" data-step-n="1">
            <div class="field"><label>Reel 主題</label><input id="p-title" value="${escapeHtml(r.title)}"></div>
            <div class="field"><label>結構</label>
              <select id="p-structure">${STRUCTURES.map((s) => `<option${s === r.structure ? " selected" : ""}>${s}</option>`).join("")}</select>
            </div>
            <div class="field"><label>頭 1–2 秒鉤子</label><textarea id="p-hook" rows="2">${escapeHtml(r.hook)}</textarea></div>
            <div class="field"><label>一條片一個重點</label><textarea id="p-core" rows="2">${escapeHtml(r.coreMessage)}</textarea></div>
            <div class="field"><label>CTA（引導留言/收藏/分享）</label><input id="p-cta" value="${escapeHtml(r.cta)}"></div>
          </div>
          <div class="wizard-step" data-step-n="2">
            <div class="ai-block">
              <div class="toolbar">
                <button type="button" id="ai-generate-options">${r.aiOptions ? "重新生成選項" : "AI 生成選項"}</button>
              </div>
              <div id="ai-picks"></div>
            </div>
          </div>
          <div class="wizard-step" data-step-n="3">
            <div class="field"><label>逐鏡頭 shot list</label>
              <div id="seg-list">${segs}</div>
              <button type="button" id="seg-add">+ 加鏡頭</button>
            </div>
            <div class="field"><label>一句總結</label><input id="p-summary" value="${escapeHtml(r.summary)}"></div>
            <div class="field"><label>完整 caption（貼 IG 用）</label>
              <textarea id="p-caption" rows="6">${escapeHtml(r.caption)}</textarea>
              <div class="caption-tools">
                <button type="button" id="assemble-caption">組裝全文</button>
                <button type="button" id="copy-caption">複製</button>
              </div>
            </div>
            <div class="field">
              <label>成個腳本（連秒數，可拍/可交攝影師）</label>
              <textarea id="p-script" rows="10">${escapeHtml(r.scriptText)}</textarea>
              <div class="script-tools">
                <button type="button" id="assemble-script">組裝腳本</button>
                <button type="button" id="copy-script">複製腳本</button>
              </div>
            </div>
            <div class="field"><label>hashtag（3–8 個，逗號分隔）</label><input id="p-tags" value="${escapeHtml(r.hashtags.join(", "))}"></div>
            <div class="field"><label>封面大字</label><input id="p-cover" value="${escapeHtml(r.coverText)}"></div>
            <div class="ai-block">
              <div class="toolbar">
                <button type="button" class="primary" id="ai-generate-content">${r.aiGeneratedAt ? "重新生成內容" : "生成完整內容"}</button>
              </div>
            </div>
          </div>
          <div class="wizard-nav">
            <button type="button" id="wiz-prev">← 上一步</button>
            <button type="button" id="wiz-skip">略過 AI →</button>
            <button type="button" id="wiz-next">下一步 →</button>
          </div>
        </div>`;

      const bind = (id, key, parse) => {
        const el = panel.querySelector(id);
        if (!el) return;
        el.addEventListener("input", () => {
          r[key] = parse ? parse(el.value) : el.value;
          r.updatedAt = new Date().toISOString();
          saveReels(state);
          if (key === "title") renderReelList();
        });
      };
      bind("#p-title", "title");
      bind("#p-structure", "structure");
      bind("#p-hook", "hook");
      bind("#p-core", "coreMessage");
      bind("#p-summary", "summary");
      bind("#p-cta", "cta");
      bind("#p-caption", "caption");
      bind("#p-script", "scriptText");
      bind("#p-cover", "coverText");
      bind("#p-tags", "hashtags", (v) => v.split(/[,，]/).map((t) => t.trim()).filter(Boolean));

      panel.querySelectorAll(".seg-row").forEach((row) => {
        const i = Number(row.dataset.i);
        const upd = () => {
          r.segments[i] = {
            label: row.querySelector(".seg-label").value,
            shot: row.querySelector(".seg-shot").value,
            voiceover: row.querySelector(".seg-voice").value,
            subtitle: row.querySelector(".seg-sub").value,
            durationSec: Number(row.querySelector(".seg-dur").value) || 0,
            note: row.querySelector(".seg-note").value
          };
          r.updatedAt = new Date().toISOString();
          saveReels(state);
        };
        row.querySelectorAll("input").forEach((el) => el.addEventListener("input", upd));
        row.querySelector(".seg-del").addEventListener("click", () => {
          r.segments.splice(i, 1);
          if (!r.segments.length) r.segments.push({ label: "", shot: "", voiceover: "", subtitle: "", durationSec: 0, note: "" });
          saveReels(state);
          renderPlan();
        });
      });
      panel.querySelector("#seg-add").addEventListener("click", () => {
        r.segments.push({ label: "", shot: "", voiceover: "", subtitle: "", durationSec: 0, note: "" });
        saveReels(state);
        renderPlan();
      });
      const stepCur = r.wizardStep || 1;
      const prevBtn = panel.querySelector("#wiz-prev");
      const nextBtn = panel.querySelector("#wiz-next");
      const skipBtn = panel.querySelector("#wiz-skip");
      if (prevBtn) prevBtn.style.display = stepCur === 1 ? "none" : "inline-block";
      if (nextBtn) nextBtn.style.display = stepCur === 3 ? "none" : "inline-block";
      if (skipBtn) skipBtn.style.display = stepCur === 2 ? "inline-block" : "none";
      if (prevBtn) prevBtn.addEventListener("click", () => goWizardStep((activeReel()?.wizardStep || 1) - 1));
      if (skipBtn) skipBtn.addEventListener("click", () => goWizardStep(3));
      if (nextBtn) nextBtn.addEventListener("click", () => {
        const r2 = activeReel(); if (!r2) return;
        const cur = r2.wizardStep || 1;
        if (cur === 1 && !canAdvanceToStep2(r2)) { alert("請先填齊主題、鉤子、重點、CTA 四格。"); return; }
        if (cur === 2 && !canAdvanceToStep3(r2)) { alert("先揀齊四組選項（結構+角度、片長+字幕風格、CTA 呈現、B-roll）。"); return; }
        goWizardStep(cur + 1);
      });
      panel.querySelectorAll(".wizard-dot").forEach((d) => {
        d.addEventListener("click", () => {
          const r2 = activeReel(); if (!r2) return;
          const target = Number(d.dataset.go);
          if (target === (r2.wizardStep || 1)) return;
          if (target >= 2 && !canAdvanceToStep2(r2)) { alert("請先填齊主題、鉤子、重點、CTA 四格。"); return; }
          if (target === 3 && !canAdvanceToStep3(r2) && !r2.aiGeneratedAt) { alert("先揀齊四組選項，或撳「略過 AI」直接手動編輯。"); return; }
          goWizardStep(target);
        });
      });
      const genOptsBtn = panel.querySelector("#ai-generate-options");
      if (genOptsBtn) genOptsBtn.addEventListener("click", regenerateOptions);
      const genContentBtn = panel.querySelector("#ai-generate-content");
      if (genContentBtn) genContentBtn.addEventListener("click", regenerateContent);
      const asmBtn = panel.querySelector("#assemble-caption");
      if (asmBtn) asmBtn.addEventListener("click", assembleCaption);
      const cpyBtn = panel.querySelector("#copy-caption");
      if (cpyBtn) cpyBtn.addEventListener("click", copyCaption);
      const asmScrBtn = panel.querySelector("#assemble-script");
      if (asmScrBtn) asmScrBtn.addEventListener("click", () => assembleScript(false));
      const cpyScrBtn = panel.querySelector("#copy-script");
      if (cpyScrBtn) cpyScrBtn.addEventListener("click", copyScript);
      renderAiOptions();
    }

    function renderShootChecklist() {
      const panel = document.getElementById("shoot-panel");
      const r = activeReel();
      if (!r) {
        panel.innerHTML = '<p style="color:#7a6f7a">請先新增或揀選一條 Reel。</p>';
        return;
      }
      const group = (keys, title) =>
        `<h3 style="margin:14px 0 6px;font-size:15px">${title}</h3>` +
        keys
          .map(
            (k) =>
              `<label style="display:block;padding:6px 0;cursor:pointer">` +
              `<input type="checkbox" data-key="${k}" ${r.checklist[k] ? "checked" : ""}> ${CHECKLIST_LABELS[k]}</label>`
          )
          .join("");
      panel.innerHTML = `<div class="progress"><div style="width:${checklistPct(r)}%"></div></div>` +
        group(TECHNIQUE_KEYS, "10 拍攝技巧") +
        group(REMEMBER_KEYS, "7 記住") +
        group(STRUCT_KEYS, "結構自查");
      panel.querySelectorAll('input[type="checkbox"]').forEach((el) => {
        el.addEventListener("change", () => {
          r.checklist[el.dataset.key] = el.checked;
          r.updatedAt = new Date().toISOString();
          saveReels(state);
          panel.querySelector(".progress > div").style.width = checklistPct(r) + "%";
          if (r.status === "planning") {
            r.status = "shooting";
            renderReelList();
          }
        });
      });
    }

    const SCORE_ADVICE = {
      hook: "試用反差／結果畫面／問句做頭 2 秒鉤子。",
      retention: "剪走廢位、縮短鏡頭、每 2 秒一個節奏點。",
      rhythm: "鏡頭 0.5–2 秒切換，配字幕跳動。",
      subtitle: "短句分行，跟節奏跳，避免一大段塞畫面。",
      audio: "收音近啲，太嘈就後期旁白／配字幕。",
      ctaClarity: "結尾一句明確 CTA：留言／收藏／分享擇一。",
      shareability: "加清單型或反差型內容，提升 save 價值。"
    };

    function renderReview() {
      const panel = document.getElementById("review-panel");
      const r = activeReel();
      if (!r) {
        panel.innerHTML = '<p style="color:#7a6f7a">請先新增或揀選一條 Reel。</p>';
        return;
      }
      const rows = SCORE_KEYS
        .map(
          (k) =>
            `<div class="field"><label>${SCORE_LABELS[k]}</label>
              <input type="range" min="0" max="5" step="1" data-key="${k}" value="${r.score[k] || 0}">
              <span data-val="${k}">${r.score[k] || 0}</span> / 5
              ${r.score[k] && r.score[k] <= 2 ? '<span class="weak"> 弱項：' + SCORE_ADVICE[k] + "</span>" : ""}
            </div>`
        )
        .join("");
      panel.innerHTML =
        rows +
        `<div class="field"><label>評分備註</label><textarea id="r-notes" rows="3">${escapeHtml(r.scoreNotes)}</textarea></div>` +
        `<button type="button" id="r-save" class="primary" style="padding:8px 14px;border-radius:8px;border:0;background:var(--rose);color:#fff;cursor:pointer">儲存評分</button>`;
      panel.querySelectorAll('input[type="range"]').forEach((el) => {
        el.addEventListener("input", () => {
          r.score[el.dataset.key] = Number(el.value);
          panel.querySelector(`[data-val="${el.dataset.key}"]`).textContent = el.value;
          saveReels(state);
        });
      });
      panel.querySelector("#r-notes").addEventListener("input", () => {
        r.scoreNotes = panel.querySelector("#r-notes").value;
        saveReels(state);
      });
      panel.querySelector("#r-save").addEventListener("click", () => {
        r.status = "scored";
        r.updatedAt = new Date().toISOString();
        saveReels(state);
        renderReelList();
        alert("評分已儲存。");
      });
    }

    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportJson() {
      downloadFile(
        "jessi-reels-studio-backup.json",
        JSON.stringify({
          exportedAt: new Date().toISOString(),
          schemaVersion: SCHEMA_VERSION,
          app: "jessi-reels-studio",
          data: state
        }, null, 2),
        "application/json"
      );
    }

    function importJsonFile(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result));
          const incoming = parsed.data && typeof parsed.data === "object" ? parsed.data : parsed;
          if (!incoming || typeof incoming !== "object" || Array.isArray(incoming)) {
            throw new Error("JSON 必須包含 data 物件。");
          }
          if (!confirm("覆蓋現有數據？匯入後會重新載入頁面。")) return;
          saveReels(normalize(incoming));
          location.reload();
        } catch (error) {
          alert("JSON 匯入失敗：" + (error.message || "格式不正確"));
        } finally {
          event.target.value = "";
        }
      };
      reader.readAsText(file);
    }

    function deleteReel() {
      const r = activeReel();
      if (!r) return;
      if (!confirm(`刪除「${r.title || "未命名"}」？此操作不可復原。`)) return;
      state.reels = state.reels.filter((x) => x.id !== r.id);
      state.activeReelId = state.reels[0]?.id || null;
      saveReels(state);
      renderReelList();
      renderPlan();
      renderShootChecklist();
      renderReview();
    }

    function duplicateReel() {
      const r = activeReel();
      if (!r) return;
      const copy = newReel();
      Object.assign(copy, JSON.parse(JSON.stringify(r)));
      copy.id = uid();
      copy.title = (r.title || "未命名") + "（複製）";
      copy.createdAt = new Date().toISOString();
      copy.updatedAt = copy.createdAt;
      copy.status = "planning";
      copy.wizardStep = 1;
      state.reels.push(copy);
      state.activeReelId = copy.id;
      saveReels(state);
      renderReelList();
      renderPlan();
      renderShootChecklist();
      renderReview();
    }

    function checklistPct(r) {
      const done = CHECKLIST_KEYS.filter((k) => r.checklist[k]).length;
      return Math.round((done / CHECKLIST_KEYS.length) * 100);
    }

    function buildAiBrief() {
      const r = activeReel();
      if (!r) return "";
      const segs = r.segments
        .map((s, i) => `Step ${i + 1}：${s.label || "（段落）"} — 畫面：${s.shot || ""} | 旁白：${s.voiceover || ""} | 字幕：${s.subtitle || ""}（${s.durationSec || "?"}秒）${s.note ? " // " + s.note : ""}`)
        .join("\n");
      return [
        "【Reels 拍片 brief — Jessi Beauty】",
        "主題：" + (r.title || "（待填）"),
        "結構：" + (r.structure || "（待選）"),
        "頭 1–2 秒鉤子：" + (r.hook || "（待填）"),
        "一條片一個重點：" + (r.coreMessage || "（待填）"),
        "",
        "逐鏡頭 shot list：",
        segs || "（待填）",
        "",
        "總結：" + (r.summary || "（待填）"),
        "CTA：" + (r.cta || "（待填）"),
        "完整 caption：" + (r.caption || "（待填）"),
        "hashtag：" + (r.hashtags.length ? r.hashtags.join(" ") : "（待填）"),
        "封面大字：" + (r.coverText || "（待填）"),
        "",
        "拍攝注意：9:16 直拍、主體放中間、短鏡頭 0.5–2 秒、收音要清、落字幕、剪走廢位、音樂要睇 license。",
        "可貼進 Cursor / Codex / Claude Code / Antigravity 生成腳本與字幕。"
      ].join("\n");
    }

    function importWeekTheme() {
      let ctx = null;
      try {
        ctx = JSON.parse(localStorage.getItem(SHARED_CONTEXT_KEY) || "null");
      } catch {
        ctx = null;
      }
      const r = activeReel();
      if (!ctx || !ctx.weekTheme) {
        alert("未偵測到今週主題，請先喺 workflow 訂立主題。");
        return;
      }
      if (!r) {
        addReel();
      }
      const reel = activeReel();
      const wt = ctx.weekTheme;
      if (wt.title) reel.title = wt.title;
      if (wt.why) reel.hook = wt.why;
      if (Array.isArray(wt.weekAngles) && wt.weekAngles[0]) {
        reel.segments[0] = { ...reel.segments[0], label: wt.weekAngles[0] };
      }
      reel.updatedAt = new Date().toISOString();
      saveReels(state);
      renderReelList();
      renderPlan();
    }

    document.getElementById("new-reel").addEventListener("click", addReel);
    renderReelList();
    document.getElementById("copy-ai-brief").addEventListener("click", async () => {
      const brief = buildAiBrief();
      if (!brief) return;
      try {
        await navigator.clipboard.writeText(brief);
        alert("已複製 AI 拍片 brief 到剪貼簿。");
      } catch {
        prompt("複製以下 brief：", brief);
      }
    });
    document.getElementById("import-theme").addEventListener("click", importWeekTheme);
    renderPlan();
    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
        document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });
    renderShootChecklist();
    renderReview();
    document.getElementById("export-json").addEventListener("click", exportJson);
    document.getElementById("import-json").addEventListener("change", importJsonFile);
    document.getElementById("delete-reel").addEventListener("click", deleteReel);
    document.getElementById("duplicate-reel").addEventListener("click", duplicateReel);
    (function initAiSettings() {
      const cfg = loadAiConfig();
      const keyEl = document.getElementById("ai-api-key");
      const modelEl = document.getElementById("ai-model");
      if (keyEl) keyEl.value = cfg.apiKey;
      if (modelEl) modelEl.value = cfg.model;
      const saveBtn = document.getElementById("ai-save-config");
      if (saveBtn) saveBtn.addEventListener("click", () => {
        saveAiConfig({ apiKey: (keyEl ? keyEl.value : "").trim(), model: modelEl ? modelEl.value : DEFAULT_MODEL });
        alert("AI 設定已儲存。");
      });
    })();
  </script>
</body>
</html>
