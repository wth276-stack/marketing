<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#c96b8a">
  <title>Jessi Beauty · Reels 拍片工作室</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="assets/jessi-auth.css?v=20260627a">
  <script src="assets/jessi-auth-config.js?v=20260627a"></script>
  <script src="assets/jessi-auth.js?v=20260627a"></script>
  <style>
    :root {
      --rose: #c96b8a;
      --ink: #2b2230;
      --muted: #7a6f7a;
      --paper: #fff5f8;
      --panel: #ffffff;
      --line: #ead9e2;
      --accent: #c96b8a;
      --shadow: 0 18px 48px rgba(43, 34, 48, .12);
      --radius: 10px;
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: var(--paper); }
    .app-shell { display: grid; grid-template-columns: 280px minmax(0, 1fr); min-height: 100vh; }
    #reel-list { padding: 16px; border-right: 1px solid var(--line); }
    .reel-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
    .reel-item.active { background: #fdeaf1; border-color: var(--rose); }
    .main { padding: 20px 24px; }
    #privacy { background: #fff3cd; color: #7a5b00; padding: 8px 14px; border-radius: 8px; font-size: 13px; }
    .tabs { display: flex; gap: 8px; margin: 14px 0; }
    .tab-btn { padding: 8px 14px; border: 1px solid var(--line); background: var(--panel); border-radius: 8px; cursor: pointer; }
    .tab-btn.active { background: var(--rose); color: #fff; border-color: var(--rose); }
    .panel { display: none; }
    .panel.active { display: block; }
    .field { margin: 10px 0; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .field input, .field select, .field textarea { width: 100%; padding: 8px; border: 1px solid var(--line); border-radius: 8px; font: inherit; }
    .seg-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 70px 1fr auto; gap: 6px; margin: 6px 0; }
    .seg-row input { padding: 6px; border: 1px solid var(--line); border-radius: 6px; font: inherit; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
    .toolbar button, .toolbar label { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--rose); background: var(--panel); cursor: pointer; font: inherit; }
    .toolbar button.primary { background: var(--rose); color: #fff; }
    .progress { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin: 10px 0; }
    .progress > div { height: 100%; background: var(--rose); }
    .weak { color: #c0392b; font-weight: 700; }
    @media (max-width: 720px) {
      .app-shell { grid-template-columns: 1fr; }
      #reel-list { border-right: 0; border-bottom: 1px solid var(--line); }
    }
    #ai-settings { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); }
    #ai-settings > summary { padding: 8px 12px; cursor: pointer; font-weight: 700; list-style: none; }
    #ai-settings > summary::before { content: "⚙️ "; }
    .ai-settings-body { padding: 8px 12px 12px; border-top: 1px solid var(--line); }
    .ai-note { font-size: 12px; color: #7a5b00; background: #fff3cd; padding: 6px 8px; border-radius: 6px; margin: 6px 0; }
    .ai-block { border: 1px solid var(--line); border-radius: 10px; padding: 12px; margin-bottom: 14px; background: #fff8fb; }
    .ai-pick-group { margin: 10px 0; }
    .ai-pick-group h4 { margin: 6px 0; font-size: 14px; }
    .ai-pick-card { border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; margin: 6px 0; cursor: pointer; background: var(--panel); }
    .ai-pick-card.selected { border-color: var(--rose); background: #fdeaf1; }
    .ai-pick-card .reason { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .ai-busy { opacity: .6; pointer-events: none; }
    #p-caption { width: 100%; min-height: 120px; font: inherit; resize: vertical; box-sizing: border-box; }
    .caption-tools { display: flex; gap: 8px; margin: 6px 0; }
    .caption-tools button { padding: 6px 12px; }
    #p-script { width: 100%; min-height: 240px; font: inherit; resize: vertical; box-sizing: border-box; }
    .script-tools { display: flex; gap: 8px; margin: 6px 0; flex-wrap: wrap; }
    .script-tools button { padding: 6px 12px; }
    .wizard-step { display: none; }
    .wizard[data-step="0"] .wizard-step[data-step-n="0"],
    .wizard[data-step="1"] .wizard-step[data-step-n="1"],
    .wizard[data-step="2"] .wizard-step[data-step-n="2"],
    .wizard[data-step="3"] .wizard-step[data-step-n="3"],
    .wizard[data-step="4"] .wizard-step[data-step-n="4"],
    .wizard[data-step="5"] .wizard-step[data-step-n="5"],
    .wizard[data-step="6"] .wizard-step[data-step-n="6"] { display: block; }
    .wizard-dots { display: flex; gap: 8px; margin: 8px 0; }
    .wizard-dot { width: 24px; height: 24px; border-radius: 50%; background: var(--line); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; }
    .wizard-dot.active { background: var(--accent); }
    .wizard-nav { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; align-items: center; }
    .hook-card { border: 1px solid var(--line); border-radius: 8px; padding: 10px; margin: 6px 0; }
    .hook-card.selected { border-color: var(--accent); background: rgba(201,107,138,0.08); }
    .hook-card .hook-type { font-size: 12px; color: var(--accent); margin-bottom: 4px; }
    .hook-card .hook-text { margin-bottom: 6px; }
    .hook-card .hook-meta { font-size: 12px; color: var(--muted); margin: 2px 0; }
    .hook-card .use-hook { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--rose); background: var(--panel); cursor: pointer; font: inherit; }
    .interaction-goal { padding: 8px; border: 1px dashed var(--line); border-radius: 8px; background: #fff8fb; }
    .goal-hint { font-size: 12px; color: var(--muted); }
    .review-issue { border-left: 3px solid var(--line); padding: 6px 10px; margin: 6px 0; }
    .review-issue.sev-高 { border-color: #d44; }
    .review-issue.sev-中 { border-color: #e80; }
    .review-issue.sev-低 { border-color: var(--line); }
    .review-issue .area { font-weight: bold; }
    .review-issue .sev { font-size: 11px; float: right; color: var(--muted); }
    .review-issue .problem { font-size: 13px; margin-top: 2px; }
    .polished-block { margin-top: 10px; }
    .polished-block label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .polished-block textarea { width: 100%; padding: 8px; border: 1px solid var(--line); border-radius: 8px; font: inherit; box-sizing: border-box; }
    .polished-block button { margin-top: 4px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--rose); background: var(--panel); cursor: pointer; }
    .idea-batch-panel { margin-top: 10px; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); }
    .idea-batch-panel[hidden] { display: none; }
    .idea-batch-toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 8px 0; }
    .idea-batch-note { font-size: 12px; color: var(--muted); }
    .idea-draft-count { font-size: 12px; color: var(--muted); margin: 4px 0; }
    .idea-empty { color: var(--muted); font-size: 13px; }
    .idea-draft-group { margin: 8px 0; }
    .idea-group-title { font-size: 12px; color: var(--accent); margin-bottom: 4px; }
    .idea-draft-card { display: flex; gap: 8px; border: 1px solid var(--line); border-radius: 8px; padding: 8px; margin: 4px 0; }
    .idea-draft-card.selected { border-color: var(--accent); background: rgba(201,107,138,0.08); }
    .idea-draft-check { flex: 0 0 auto; }
    .idea-draft-body { flex: 1 1 auto; }
    .idea-draft-title { font-weight: 700; }
    .idea-draft-core { font-size: 13px; margin-top: 2px; }
    .idea-draft-rationale { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .video-prompt-block { border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; margin: 6px 0; }
    .video-prompt-block label { font-size: 12px; color: var(--muted); display: block; margin-top: 4px; }
    .video-prompt-block textarea { width: 100%; min-height: 60px; font: inherit; resize: vertical; box-sizing: border-box; }
    .video-prompt-meta { font-size: 12px; color: var(--muted); margin: 2px 0; }
    .carousel-slide { border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; margin: 6px 0; }
    .carousel-slide .slide-type { font-size: 12px; color: var(--accent); margin-bottom: 4px; }
    .carousel-slide input, .carousel-slide textarea { width: 100%; font: inherit; box-sizing: border-box; margin: 2px 0; }
    .carousel-slide textarea { min-height: 50px; resize: vertical; }
    .asset-note { width: 100%; min-height: 50px; font: inherit; resize: vertical; box-sizing: border-box; }
    .confirm-bar { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
    .confirm-bar button { padding: 6px 12px; }
    .app-toast { position: fixed; top: 16px; right: 16px; z-index: 9999; max-width: 320px; padding: 10px 14px; border-radius: 8px; font-size: 14px; box-shadow: 0 4px 16px rgba(0,0,0,.18); background: #2a2230; color: #fff; cursor: pointer; }
    .app-toast.error { background: #b3261e; }
    .app-toast.update { background: #c96b8a; }
    .app-toast.info { background: #2a2230; }
    .ai-btn-loading { position: relative; padding-left: 28px; cursor: progress; }
    .ai-btn-loading::before { content: ""; position: absolute; left: 8px; top: 50%; width: 12px; height: 12px; margin-top: -6px; border: 2px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: ai-spin 0.8s linear infinite; }
    @keyframes ai-spin { to { transform: rotate(360deg); } }
    .ai-cancel-btn { margin-left: 8px; padding: 4px 12px; font-size: 13px; background: #b3261e; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .ai-cancel-btn:hover { background: #9a211a; }
    .saved-indicator { position: fixed; bottom: 16px; right: 16px; z-index: 9998; padding: 6px 12px; border-radius: 6px; font-size: 13px; background: #2e7d32; color: #fff; opacity: 0; transition: opacity .25s ease; pointer-events: none; }
    .saved-indicator.show { opacity: 1; }
    .status-badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 11px; color: #fff; cursor: pointer; background: #7a6f7a; }
    .status-badge[data-status="readyShoot"] { background: #c96b8a; }
    .status-badge[data-status="shooting"] { background: #e8a33d; }
    .status-badge[data-status="readyEdit"] { background: #8a5cd8; }
    .status-badge[data-status="readyPublish"] { background: #3d8ae8; }
    .status-badge[data-status="published"] { background: #2e7d32; }
    .status-badge[data-status="scored"] { background: #5a5a5a; }
    .status-badge:hover { opacity: .85; }
    .status-picker { position: absolute; z-index: 9999; background: #fff; border: 1px solid var(--rose); border-radius: 8px; padding: 8px; box-shadow: 0 4px 12px rgba(0,0,0,.15); display: flex; flex-direction: column; gap: 4px; min-width: 120px; }
    .status-picker-title { font-size: 12px; color: #7a6f7a; margin-bottom: 2px; }
    .status-picker-empty { font-size: 12px; color: #7a6f7a; padding: 4px; }
    .status-pick-btn { padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
    .status-pick-btn:hover { background: #fdeaf1; border-color: var(--rose); }
    .status-pick-close { padding: 4px 10px; border: 0; border-radius: 6px; background: #eee; cursor: pointer; font-size: 12px; }
    .reel-overview { padding: 6px 10px; font-size: 12px; color: #5a505a; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; border-bottom: 1px dashed #e8dfe5; }
    .ov-total { font-weight: 700; color: #3a303a; }
    .ov-chip { padding: 1px 6px; border-radius: 8px; font-size: 11px; color: #fff; }
 .ov-chip[data-status="planning"] { background: #7a6f7a; }
    .ov-chip[data-status="readyShoot"] { background: #c96b8a; }
    .ov-chip[data-status="shooting"] { background: #e8a33d; }
    .ov-chip[data-status="readyEdit"] { background: #8a5cd8; }
    .ov-chip[data-status="readyPublish"] { background: #3d8ae8; }
    .ov-chip[data-status="published"] { background: #2e7d32; }
    .ov-chip[data-status="scored"] { background: #5a5a5a; }
    .reel-list-controls { padding: 6px 10px; display: flex; flex-direction: column; gap: 4px; border-bottom: 1px solid #e8dfe5; }
    .reel-list-controls input, .reel-list-controls select { font-size: 12px; padding: 3px 6px; border: 1px solid #ddd; border-radius: 6px; }
    .publish-section { border: 1px solid #e8dfe5; border-radius: 8px; padding: 10px; margin-bottom: 12px; background: #faf6f8; }
    .publish-section h4 { margin: 0 0 8px; font-size: 14px; color: var(--rose); }
    .publish-engagement { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 6px; }
    .pub-at { font-size: 13px; color: #5a505a; }
    .asset-card { border: 1px solid #e8dfe5; border-radius: 8px; padding: 10px; margin-top: 8px; background: #faf6f8; }
    .asset-card-actions { margin: 4px 0; }
    .asset-card-actions button { padding: 4px 12px; border: 1px solid var(--rose); border-radius: 6px; background: #fff; color: var(--rose); cursor: pointer; font-size: 13px; }
    .asset-card-actions button:hover { background: #fdeaf1; }
    .asset-preview { margin: 6px 0; min-height: 0; }
    .asset-preview img { max-width: 100%; max-height: 160px; border-radius: 6px; border: 1px solid #e8dfe5; }
  </style>
</head>
<body>
  <p id="privacy">⚠️ 私隱提醒：唔好輸入客人全名、電話、完整對話或相片。</p>
  <div id="app-toast" class="app-toast" hidden></div>
  <div id="saved-indicator" class="saved-indicator" hidden>✓ 已儲存</div>
  <div class="app-shell">
    <aside id="reel-list">
      <div class="toolbar">
        <button type="button" class="primary" id="new-reel">+ 新增 Reel</button>
        <button type="button" id="open-idea-batch">批量出 Idea</button>
        <button type="button" id="save-template">存做模板</button>
        <button type="button" id="new-from-template">由模板開新</button>
        <button type="button" id="duplicate-reel">複製</button>
        <button type="button" id="delete-reel">刪除</button>
      </div>
      <div id="reel-overview" class="reel-overview"></div>
      <div class="reel-list-controls">
        <input id="reel-search" type="search" placeholder="搵 reel（標題/結構）">
        <select id="reel-status-filter">
          <option value="all">全部狀態</option>
          <option value="planning">策劃</option>
          <option value="readyShoot">待拍</option>
          <option value="shooting">拍攝中</option>
          <option value="readyEdit">待剪</option>
          <option value="readyPublish">待發佈</option>
          <option value="published">已發佈</option>
          <option value="scored">已復盤</option>
        </select>
        <select id="reel-sort">
          <option value="updated">按更新時間</option>
          <option value="created">按建立時間</option>
          <option value="status">按狀態</option>
        </select>
      </div>
      <div id="reel-items"></div>
      <div id="template-library-panel" class="idea-batch-panel" hidden></div>
      <div id="idea-batch-panel" class="idea-batch-panel" hidden>
        <div class="field"><label>主題</label><input id="idea-batch-topic" placeholder="例如 HIFU / 夏日控油 / 產後修腹"></div>
        <div class="field"><label>重點提示（選填）</label><input id="idea-batch-core" placeholder="想強調嘅角度或賣點，可唔填"></div>
        <div class="idea-batch-toolbar">
          <button type="button" class="primary" id="ai-generate-ideas">AI 生成 Idea</button>
          <span class="idea-batch-note">品牌資料 + 受眾（30-55 歲女性）已自動套用</span>
        </div>
        <div id="idea-draft-count" class="idea-draft-count"></div>
        <div id="idea-drafts"></div>
        <div class="idea-batch-toolbar">
          <button type="button" id="clear-idea-drafts">全清勾選</button>
          <button type="button" class="primary" id="create-reels-from-drafts" disabled>建立選中嘅 reel</button>
        </div>
      </div>
    </aside>
    <main class="main">
      <div id="reel-toolbar" class="toolbar">
        <button type="button" id="import-theme">從今週主題帶入</button>
        <button type="button" class="primary" id="copy-ai-brief">複製 AI 拍片 brief</button>
        <button type="button" id="export-json">匯出 JSON</button>
        <label>匯入 JSON <input type="file" id="import-json" accept=".json" hidden></label>
          <details id="ai-settings">
            <summary>AI 設定</summary>
            <div class="ai-settings-body">
              <p class="ai-note">API key 只存本機瀏覽器，只會直接傳去 Google Gemini API。</p>
              <div class="field"><label>Gemini API key</label><input type="password" id="ai-api-key" placeholder="AIza..."></div>
              <div class="field"><label>模型</label>
                <select id="ai-model">
                  <option value="gemini-2.5-flash" selected>gemini-2.5-flash（快、免費額）</option>
                  <option value="gemini-2.5-pro">gemini-2.5-pro</option>
                  <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                </select>
              </div>
              <button type="button" id="ai-save-config">儲存設定</button>
            </div>
          </details>
          <details id="backup-panel">
            <summary>備份與還原</summary>
            <div class="ai-settings-body">
              <p class="ai-note">每次改動會自動備份到瀏覽器 IndexedDB（保留最近 20 個）。可手動還原。</p>
              <button type="button" id="backup-now">立即備份</button>
              <div id="backup-list"></div>
            </div>
          </details>
      </div>
      <div class="tabs">
        <button type="button" class="tab-btn active" data-tab="plan-panel">策劃</button>
        <button type="button" class="tab-btn" data-tab="shoot-panel">拍攝日</button>
        <button type="button" class="tab-btn" data-tab="review-panel">復盤</button>
      </div>
      <section id="plan-panel" class="panel active"></section>
      <section id="shoot-panel" class="panel"></section>
      <section id="review-panel" class="panel"></section>
    </main>
  </div>
  <script>
    const STORAGE = "jessi-reels-studio-v1";
    const SHARED_CONTEXT_KEY = "jessi-shared-context";
    const SCHEMA_VERSION = 1;
    const REEL_SCHEMA_VERSION = 5;

    const REEL_STATUSES = ["planning", "readyShoot", "shooting", "readyEdit", "readyPublish", "published", "scored"];
    const STATUS_LABELS = {
      planning: "策劃",
      readyShoot: "待拍",
      shooting: "拍攝中",
      readyEdit: "待剪",
      readyPublish: "待發佈",
      published: "已發佈",
      scored: "已復盤"
    };
    const STATUS_COLORS = {
      planning: "#7a6f7a",
      readyShoot: "#c96b8a",
      shooting: "#e8a33d",
      readyEdit: "#8a5cd8",
      readyPublish: "#3d8ae8",
      published: "#2e7d32",
      scored: "#5a5a5a"
    };

    function canTransition(from, to) {
      const i = REEL_STATUSES.indexOf(from);
      const j = REEL_STATUSES.indexOf(to);
      if (i < 0 || j < 0) return false;
      return Math.abs(i - j) === 1;
    }
    const CONFIG_KEY = "jessi-reels-gemini-config";
    const GEMINI_ENDPOINT = "https://generativelanguage.googleapis.com/v1beta/models/";
    const DEFAULT_MODEL = "gemini-2.5-flash";
    const STRUCTURES = ["反差型", "清單型", "結果先行型", "問題解答型", "拆解型", "錯誤型", "教學型", "故事型", "對比型", "步驟型"];
    const ANGLES = ["前後對比", "常見錯誤", "秘密技巧", "迷思破解", "步驟拆解", "過來人經驗", "反直覺真相", "清單盤點"];
    const LENGTH_SECONDS = [15, 25, 30, 45, 60, 90, 120];
    const SUBTITLE_STYLES = ["大字重點", "逐句跟讀", "標題＋關鍵字", "純VO無字幕", "KV字卡"];
    const HOOK_TYPES = ["痛點版", "反差版", "結果版", "好奇版", "錯誤版", "清單版", "問題版", "否定常識版", "身份認同版", "直接命令版"];
    const HOOK_FORMULAS = [
      "你以為＿＿，其實＿＿。",
      "如果你＿＿，可能唔係因為＿＿，而係＿＿。",
      "大部分人做＿＿，都忽略咗＿＿。",
      "想＿＿，先唔好急住＿＿。",
      "我會建議你先改＿＿，而唔係＿＿。",
      "＿＿之前，你一定要知道呢件事。",
      "呢個位唔改，你做幾多都好易冇效果。"
    ];
    const CTA_VARIANTS = {

    function migrateReelToV3(r) {
      const out = { ...r };

      if (!Array.isArray(out.directionCandidates)) out.directionCandidates = [];
      if (r.wizardStep === undefined) {
        out.wizardStep = inferWizardStep(out);
      } else if (r.wizardStep >= 1 && r.wizardStep <= 3) {
        out.wizardStep = r.wizardStep - 1;
      } else {
        out.wizardStep = r.wizardStep;
      }
      return out;
    }

    function migrateReelToV4(r) {
      const out = { ...r };
      if (!Array.isArray(out.videoPrompts)) out.videoPrompts = [];
      if (typeof out.videoMasterPrompt !== "string") out.videoMasterPrompt = "";
      if (typeof out.videoOverallStyle !== "string") out.videoOverallStyle = "";
      if (out.videoPromptAt === undefined) out.videoPromptAt = null;
      if (typeof out.videoAssetNote !== "string") out.videoAssetNote = "";

      if (out.carouselConfirmedAt === undefined) out.carouselConfirmedAt = null;
      if (!Array.isArray(out.imagePrompts)) out.imagePrompts = [];
      if (out.imagePromptAt === undefined) out.imagePromptAt = null;
      if (typeof out.imageAssetNote !== "string") out.imageAssetNote = "";
      return out;
    }

    function migrateReelToV5(r) {
      const out = { ...r };

      if (out.views === undefined || out.views === null) out.views = null;
      if (out.likes === undefined || out.likes === null) out.likes = null;
      if (out.saves === undefined || out.saves === null) out.saves = null;
      if (out.comments === undefined || out.comments === null) out.comments = null;
      if (typeof out.videoAssetUrl !== "string") out.videoAssetUrl = "";
      if (typeof out.videoAssetStatus !== "string") out.videoAssetStatus = "待生成";
      if (typeof out.imageAssetUrl !== "string") out.imageAssetUrl = "";
      if (typeof out.imageAssetStatus !== "string") out.imageAssetStatus = "待生成";

    function normalize(state) {
      if (!state || typeof state !== "object") state = { reels: [], activeReelId: null };
      if (!Array.isArray(state.reels)) state.reels = [];

      const box = document.getElementById("reel-items");

      const q = (prefs.q || "").trim().toLowerCase();

      if (prefs.statusFilter && prefs.statusFilter !== "all") list = list.filter((r) => r.status === prefs.statusFilter);
      if (prefs.sort === "created") list.sort((a, b) => (a.createdAt || "").localeCompare(b.createdAt || ""));

    function bindReelListControls() {

    function renderStatusPicker(r, anchorEl) {
      const existing = document.getElementById("status-picker");
      if (existing) existing.remove();
      const opts = REEL_STATUSES.filter((s) => s !== r.status && canTransition(r.status, s));
      const wrap = document.createElement("div");
      wrap.innerHTML =
        `<div id="status-picker" class="status-picker">` +
        `<div class="status-picker-title">轉去：</div>` +
        (opts.length
          ? opts.map((s) => `<button type="button" class="status-pick-btn" data-status="${s}">${STATUS_LABELS[s]}</button>`).join("")
          : `<div class="status-picker-empty">已到盡頭，冇可切換狀態。</div>`) +
        `<button type="button" class="status-pick-close">取消</button>` +
        `</div>`;
      const pop = wrap.firstElementChild;
      document.body.appendChild(pop);
      const rect = anchorEl.getBoundingClientRect();
      pop.style.top = (rect.bottom + window.scrollY + 4) + "px";
      pop.style.left = (rect.left + window.scrollX) + "px";
      pop.querySelectorAll(".status-pick-btn").forEach((b) => {
        b.addEventListener("click", () => {
          const newStatus = b.dataset.status;
          r.status = newStatus;
          if (newStatus === "published" && !r.publishedAt) r.publishedAt = new Date().toISOString();

          saveReels(state);
          pop.remove();
          renderReelList();
        });
      });

    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function isQuotaError(e) {
      if (!e) return false;
      if (e && (e.name === "QuotaExceededError" || e.code === 22 || e.code === 1014)) return true;

    const BACKUP_DB = "jessi-reels-backup";

    function openBackupDb() {
      return new Promise((resolve, reject) => {
        if (!("indexedDB" in window)) { reject(new Error("no-idb")); return; }
        const req = indexedDB.open("jessi-reels-backup", 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(BACKUP_STORE)) {
            db.createObjectStore(BACKUP_STORE, { keyPath: "ts" });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function saveBackup(currentState) {
      return openBackupDb().then((db) => new Promise((resolve, reject) => {
        const tx = db.transaction(BACKUP_STORE, "readwrite");
        const store = tx.objectStore(BACKUP_STORE);
        const ts = Date.now();
        const snap = { ts, state: JSON.parse(JSON.stringify(currentState)), reelCount: Array.isArray(currentState.reels) ? currentState.reels.length : 0 };
        store.put(snap);
        tx.oncomplete = () => {
          // 旋轉：保留最近 BACKUP_MAX 個
          const rx = db.transaction(BACKUP_STORE, "readwrite");
          const rstore = rx.objectStore(BACKUP_STORE);
          const allReq = rstore.getAll();
          allReq.onsuccess = () => {
            const all = allReq.result || [];
            if (all.length > BACKUP_MAX) {
              all.sort((a, b) => a.ts - b.ts);
              all.slice(0, all.length - BACKUP_MAX).forEach((s) => rstore.delete(s.ts));
            }
          };
          db.close();
          resolve();
        };
        tx.onerror = () => { db.close(); reject(tx.error); };
      })).catch(() => {});
    }

    function listBackups() {
      return openBackupDb().then((db) => new Promise((resolve, reject) => {
        const tx = db.transaction(BACKUP_STORE, "readonly");
        const req = tx.objectStore(BACKUP_STORE).getAll();
        req.onsuccess = () => { db.close(); resolve((req.result || []).sort((a, b) => b.ts - a.ts)); };
        req.onerror = () => { db.close(); reject(req.error); };
      })).catch(() => []);
    }

    function deleteBackup(ts) {
      return openBackupDb().then((db) => new Promise((resolve, reject) => {
        const tx = db.transaction(BACKUP_STORE, "readwrite");
        tx.objectStore(BACKUP_STORE).delete(ts);
        tx.oncomplete = () => { db.close(); resolve(); };
        tx.onerror = () => { db.close(); reject(tx.error); };
      })).catch(() => {});
    }

    function restoreBackup(ts) {
      return openBackupDb().then((db) => new Promise((resolve, reject) => {
        const tx = db.transaction(BACKUP_STORE, "readonly");
        const req = tx.objectStore(BACKUP_STORE).get(ts);
        req.onsuccess = () => {
          db.close();
          const snap = req.result;
          if (!snap || !snap.state) { reject(new Error("backup-not-found")); return; }
          if (!confirm("還原呢個備份會覆蓋現有資料，繼續？")) { resolve(); return; }
          saveReels(normalize(JSON.parse(JSON.stringify(snap.state))));
          showToast("已還原備份，重新載入中…", "info");
          setTimeout(() => location.reload(), 600);
          resolve();
        };
        req.onerror = () => { db.close(); reject(req.error); };
      })).catch((e) => { showToast("還原失敗：" + (e && e.message || "未知錯誤"), "error"); });
    }

    const GEMINI_TIMEOUT_MS = 60000;
    const GEMINI_MAX_RETRIES = 2;

    function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

    async function callGemini(promptText, responseSchema, opts) {
      opts = opts || {};
      const cfg = loadAiConfig();
      if (!cfg.apiKey) throw { type: "no-key" };
      const url = GEMINI_ENDPOINT + encodeURIComponent(cfg.model) + ":generateContent?key=" + encodeURIComponent(cfg.apiKey);
      const body = { contents: [{ parts: [{ text: promptText }] }], generationConfig: { responseMimeType: "application/json" } };
      if (responseSchema) body.generationConfig.responseSchema = responseSchema;
      const startTime = Date.now();
      let progressTimer = null;
      if (typeof opts.onProgress === "function") {
        progressTimer = setInterval(() => { opts.onProgress(Math.floor((Date.now() - startTime) / 1000)); }, 1000);
      }
      let lastErr = null;
      try {
        for (let attempt = 0; attempt <= GEMINI_MAX_RETRIES; attempt++) {
          if (opts.signal && opts.signal.aborted) throw { type: "cancelled" };
          const internal = new AbortController();
          const timeoutId = setTimeout(() => internal.abort(), GEMINI_TIMEOUT_MS);
          let signal = internal.signal;
          if (opts.signal) {
            if (typeof AbortSignal !== "undefined" && AbortSignal.any) {
              signal = AbortSignal.any([internal.signal, opts.signal]);
            } else {
              opts.signal.addEventListener("abort", () => internal.abort());
            }
          }
          let resp;
          try {
            resp = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body), signal });
          } catch (e) {
            clearTimeout(timeoutId);
            if (opts.signal && opts.signal.aborted) throw { type: "cancelled" };
            lastErr = { type: internal.signal.aborted ? "timeout" : "network" };
            if (attempt < GEMINI_MAX_RETRIES) { await sleep(500 * Math.pow(2, attempt)); continue; }
            throw lastErr;
          }
          clearTimeout(timeoutId);
          if (resp.status === 401 || resp.status === 403) throw { type: "auth" };
          if (resp.status === 429) throw { type: "quota" };
          if (!resp.ok) { lastErr = { type: "network" }; if (attempt < GEMINI_MAX_RETRIES) { await sleep(500 * Math.pow(2, attempt)); continue; } throw lastErr; }
          let data;
          try { data = await resp.json(); } catch { lastErr = { type: "network" }; if (attempt < GEMINI_MAX_RETRIES) { await sleep(500 * Math.pow(2, attempt)); continue; } throw lastErr; }
          const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
          try { return JSON.parse(raw); } catch { lastErr = { type: "parse", raw }; if (attempt < GEMINI_MAX_RETRIES) { await sleep(500 * Math.pow(2, attempt)); continue; } throw lastErr; }
        }
        throw lastErr || { type: "network" };
      } finally {
        if (progressTimer) clearInterval(progressTimer);
      }
    }

    function handleAiError(e) {
      if (e && e.type === "cancelled") { return; }
      if (e && e.type === "timeout") { showToast("Gemini 等太耐，請再試。", "error"); return; }
      if (e && e.type === "no-key") {
        const d = document.getElementById("ai-settings"); if (d) d.open = true;
        const k = document.getElementById("ai-api-key"); if (k) k.focus();
        alert("請先喺「AI 設定」輸入 Gemini API key。");
        return;
      }
      if (e && e.type === "auth") {
        const d = document.getElementById("ai-settings"); if (d) d.open = true;
        alert("API key 無效，請去「AI 設定」檢查。");
        return;
      }
      if (e && e.type === "quota") { alert("額度用盡或太頻繁，稍後再試。"); return; }
      if (e && e.type === "network") { alert("連唔到 Gemini，check 網絡。"); return; }
      if (e && e.type === "parse") { alert("Gemini 回應格式異常，請再試。"); console.warn("Gemini raw:", e.raw); return; }
      alert("發生未知錯誤。");
    }

    function bindAiBtnLoading(btn, baseLabel) {
      const controller = new AbortController();
      const start = Date.now();
      let timer = null;
      let cancelBtn = null;
      if (btn) {
        btn.disabled = true;
        btn.classList.add("ai-btn-loading");
        btn.textContent = "生成中… 0s";
        timer = setInterval(() => {
          if (btn) btn.textContent = "生成中… " + Math.floor((Date.now() - start) / 1000) + "s";
        }, 1000);
        cancelBtn = document.createElement("button");
        cancelBtn.type = "button";
        cancelBtn.className = "ai-cancel-btn";
        cancelBtn.textContent = "取消";
        cancelBtn.addEventListener("click", () => controller.abort());
        if (btn.parentNode) btn.parentNode.insertBefore(cancelBtn, btn.nextSibling);
      }
      function stop() {
        if (timer) clearInterval(timer);
        if (cancelBtn && cancelBtn.parentNode) cancelBtn.parentNode.removeChild(cancelBtn);
        if (btn) { btn.disabled = false; btn.classList.remove("ai-btn-loading"); btn.textContent = baseLabel; }
      }
      return { signal: controller.signal, stop };
    }

    async function runAiGenerate({ btnId, promptFn, schema, preGuard, assign, postRender, labelGen, regenConfirm }) {
      const r = activeReel();
      if (!r) { alert("請先新增或揀選一條 Reel。"); return; }
      if (regenConfirm && !regenConfirm(r)) return;
      if (preGuard) { const msg = preGuard(r); if (msg) { alert(msg); return; } }
      const btn = document.getElementById(btnId);
      const loading = bindAiBtnLoading(btn, "生成中…");
      try {
        const data = await callGemini(promptFn(r), schema, { signal: loading.signal });
        assign(r, data);
        r.updatedAt = new Date().toISOString();
        saveReels(state);
        if (postRender) postRender();
        else renderPlan();
      } catch (e) {
        handleAiError(e);
      } finally {
        loading.stop();
        if (btn) btn.textContent = labelGen(r);
      }
    }

      }
      const btn = document.getElementById("ai-generate-ideas");

      try {
        const data = await callGemini(ideaBatchPrompt(topic, coreHint), IDEA_BATCH_SCHEMA, { signal: loading.signal });
        const now = new Date().toISOString();
        state.ideaDrafts = (Array.isArray(data.ideas) ? data.ideas : []).map((idea) => ({

          createdAt: now

        renderIdeaDrafts();

        handleAiError(e);
      } finally {
        loading.stop();

    function createReelsFromDrafts() {
      if (!Array.isArray(state.ideaDrafts)) return;
      const selected = state.ideaDrafts.filter((d) => d.selected);
      if (!selected.length) { alert("請先勾選要建立嘅 idea。"); return; }
      let firstId = null;
      selected.forEach((draft) => {
        const reel = newReel();
        reel.title = draft.title;
        reel.structure = STRUCTURES.includes(draft.structure) ? draft.structure : "反差型";
        reel.coreMessage = draft.coreMessage;
        reel.aiPicks.structure = reel.structure;
        reel.wizardStep = 0;
        reel.status = "planning";
        state.reels.push(reel);
        if (!firstId) firstId = reel.id;
      });
      state.ideaDrafts = state.ideaDrafts.filter((d) => !d.selected);
      if (firstId) state.activeReelId = firstId;
      saveReels(state);
      renderReelList();
      renderPlan();
      renderIdeaDrafts();
      alert("已建立 " + selected.length + " 條新 reel。");
    }

    function renderIdeaDrafts() {
      const box = document.getElementById("idea-drafts");
      if (!box) return;
      const drafts = Array.isArray(state.ideaDrafts) ? state.ideaDrafts : [];
      const selectedCount = drafts.filter((d) => d.selected).length;
      const createBtn = document.getElementById("create-reels-from-drafts");
      if (createBtn) createBtn.disabled = selectedCount === 0;
      const countEl = document.getElementById("idea-draft-count");
      if (countEl) countEl.textContent = drafts.length ? "已揀 " + selectedCount + " / " + drafts.length : "";
      if (!drafts.length) {
        box.innerHTML = '<p class="idea-empty">未生成 idea，入主題撳「AI 生成 Idea」。</p>';
        return;
      }
      const groups = {};
      drafts.forEach((d, i) => {
        const key = d.structure || "其他";
        if (!groups[key]) groups[key] = [];
        groups[key].push({ d, i });
      });
      box.innerHTML = Object.keys(groups).map((key) =>
        `<div class="idea-draft-group"><div class="idea-group-title">${escapeHtml(key)}</div>` +
        groups[key].map(({ d, i }) =>
          `<div class="idea-draft-card${d.selected ? " selected" : ""}" data-i="${i}">` +
          `<label class="idea-draft-check"><input type="checkbox" class="idea-chk"${d.selected ? " checked" : ""}></label>` +
          `<div class="idea-draft-body">` +
          `<div class="idea-draft-title">${escapeHtml(d.title || "")}</div>` +
          `<div class="idea-draft-core">${escapeHtml(d.coreMessage || "")}</div>` +
          `<div class="idea-draft-rationale">${escapeHtml(d.rationale || "")}</div>` +
          `</div></div>`
        ).join("") +
        `</div>`
      ).join("");
      box.querySelectorAll(".idea-draft-card").forEach((card) => {
        const chk = card.querySelector(".idea-chk");
        if (!chk) return;

          const i = Number(card.dataset.i);

      });

      const text = `【Carousel 圖片生成 prompt — ${r.title || ""}】\n\n` +
        r.imagePrompts.map((p) => `【Slide ${p.slideIndex + 1}】\n${p.prompt || ""}`).join("\n\n");
      const btn = document.getElementById("copy-image-prompts");
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          if (btn) { const old = btn.textContent; btn.textContent = "已複製 ✓"; setTimeout(() => { btn.textContent = old; }, 1500); }
        }).catch(() => { alert("複製失敗，請手動選取複製。"); });
      } else {
        alert("此瀏覽器唔支援自動複製，請手動選取複製。");
      }
    }

    function canAdvanceToStep1(r) {
      return !!(r.title.trim() && r.hook.trim() && r.coreMessage.trim() && r.cta.trim());
    }

    function canAdvanceToStep2(r) {
      const p = r.aiPicks || {};
      return !!(p.structure && p.angle && p.lengthSec != null && p.subtitleStyle && p.ctaStyle && p.broll);
    }

    function canAdvanceToStep3(r) {
      return !!r.aiGeneratedAt;
    }

    function canAdvanceToStep4(r) {
      return !!r.aiGeneratedAt;
    }

    function canAdvanceToStep5(r) {
      return !!r.videoPromptAt;
    }

    function canAdvanceToStep6(r) {
      return !!r.carouselConfirmedAt;
    }

    function goWizardStep(n) {
      const r = activeReel();
      if (!r) return;
      n = Math.max(0, Math.min(6, n));
      r.wizardStep = n;
      r.updatedAt = new Date().toISOString();
      saveReels(state);
      renderPlan();
    }

    function tryAdvanceWizard() {
      const r = activeReel(); if (!r) return;
      const cur = r.wizardStep ?? 0;
      if (cur === 0 && !canAdvanceToStep1(r)) { alert("請先填主題、重點，同揀 Hook、CTA。"); return; }
      if (cur === 1 && !canAdvanceToStep2(r)) { alert("先揀齊結構、角度、片長、字幕風格，同生成選項。"); return; }
      if (cur === 2 && !canAdvanceToStep3(r)) { alert("先生成完整內容。"); return; }
      if (cur === 3 && !canAdvanceToStep4(r)) { alert("先生成完整內容再出影片 prompt。"); return; }
      if (cur === 4 && !canAdvanceToStep5(r)) { alert("先確認影片 prompt。"); return; }
      if (cur === 5 && !canAdvanceToStep6(r)) { alert("先確認 Carousel。"); return; }
      goWizardStep(cur + 1);
    }

    function switchTab(panelId) {
      document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
      document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
      const btn = document.querySelector('.tab-btn[data-tab="' + panelId + '"]');
      if (btn) btn.classList.add("active");
      const panel = document.getElementById(panelId);
      if (panel) panel.classList.add("active");
    }

    function renderPlan() {

                <div class="asset-card-actions"><button type="button" id="video-asset-open">打開 URL</button></div>
                <div class="field"><label>備註</label><textarea id="video-asset-note" class="asset-note" rows="2" placeholder="其他備註">${escapeHtml(r.videoAssetNote || "")}</textarea></div>
              </div>

          <div class="wizard-step" data-step-n="5">

              <div class="toolbar">
                <button type="button" id="ai-gen-image-prompts">${r.imagePrompts && r.imagePrompts.length ? "重新生成圖片 prompt" : "AI 生成圖片 prompt"}</button>

              <div id="image-prompt-list"></div>
              <div class="confirm-bar">
                <button type="button" id="confirm-image-prompts">${r.imagePromptAt ? "已確認（重新確認）" : "確認圖片 prompt"}</button>
                <button type="button" id="copy-image-prompts" ${r.imagePromptAt ? "" : "disabled"}>複製圖片 prompt</button>
              </div>
              <div class="asset-card">
                <div class="field"><label>圖片素材連結</label><input id="image-asset-url" type="url" placeholder="貼生成後嘅圖片 URL" value="${escapeHtml(r.imageAssetUrl || "")}"></div>
                <div class="field"><label>素材狀態</label><select id="image-asset-status">${["待生成", "生成中", "已生成", "已採用"].map((s) => `<option${r.imageAssetStatus === s ? " selected" : ""}>${s}</option>`).join("")}</select></div>
                <div class="asset-card-actions"><button type="button" id="image-asset-open">打開 URL</button></div>
                <div id="image-asset-preview" class="asset-preview">${r.imageAssetUrl ? `<img src="${escapeHtml(r.imageAssetUrl)}" alt="縮圖" onerror="this.parentNode.style.display='none'">` : ""}</div>

          </div>
        </div>`;

      const bind = (id, key, parse) => {

      if (hookFormulaSelEl) hookFormulaSelEl.addEventListener("change", () => {
        r.hookFormulaSel = hookFormulaSelEl.value;
        r.updatedAt = new Date().toISOString();
        saveReels(state);
      });
      const pickStructure = panel.querySelector("#pick-structure");
      if (pickStructure) pickStructure.addEventListener("change", () => {
        r.aiPicks = r.aiPicks || {};
        r.aiPicks.structure = pickStructure.value;
        r.structure = pickStructure.value;
        r.updatedAt = new Date().toISOString();
        saveReels(state);
      });
      const pickAngle = panel.querySelector("#pick-angle");
      if (pickAngle) pickAngle.addEventListener("change", () => {
        r.aiPicks = r.aiPicks || {};
        r.aiPicks.angle = pickAngle.value;
        r.updatedAt = new Date().toISOString();
        saveReels(state);
      });
      const pickLength = panel.querySelector("#pick-length");
      if (pickLength) pickLength.addEventListener("change", () => {
        r.aiPicks = r.aiPicks || {};
        r.aiPicks.lengthSec = Number(pickLength.value) || null;
        r.updatedAt = new Date().toISOString();
        saveReels(state);
      });
      const pickSubtitle = panel.querySelector("#pick-subtitle-style");
      if (pickSubtitle) pickSubtitle.addEventListener("change", () => {
        r.aiPicks = r.aiPicks || {};
        r.aiPicks.subtitleStyle = pickSubtitle.value || null;
        r.updatedAt = new Date().toISOString();
        saveReels(state);
      });

      panel.querySelectorAll(".seg-row").forEach((row) => {
        const i = Number(row.dataset.i);

          r.segments[i] = {
            label: row.querySelector(".seg-label").value,
            shot: row.querySelector(".seg-shot").value,
            voiceover: row.querySelector(".seg-voice").value,
            subtitle: row.querySelector(".seg-sub").value,
            durationSec: Number(row.querySelector(".seg-dur").value) || 0,
            note: row.querySelector(".seg-note").value
          };
          r.updatedAt = new Date().toISOString();
          saveReels(state);
        };
        row.querySelectorAll("input").forEach((el) => el.addEventListener("input", upd));
        row.querySelector(".seg-del").addEventListener("click", () => {
          r.segments.splice(i, 1);
          if (!r.segments.length) r.segments.push({ label: "", shot: "", voiceover: "", subtitle: "", durationSec: 0, note: "" });

          saveReels(state);
          renderSegList();

      });

        r.segments.push({ label: "", shot: "", voiceover: "", subtitle: "", durationSec: 0, note: "" });

        saveReels(state);
        renderSegList();
      });
      const stepCur = r.wizardStep ?? 0;
      const prevBtn = panel.querySelector("#wiz-prev");
      const nextBtn = panel.querySelector("#wiz-next");
      const skipBtn = panel.querySelector("#wiz-skip");
      if (prevBtn) prevBtn.style.display = stepCur === 0 ? "none" : "inline-block";
      if (nextBtn) nextBtn.style.display = stepCur === 6 ? "none" : "inline-block";
      if (skipBtn) skipBtn.style.display = stepCur === 1 ? "inline-block" : "none";
      if (prevBtn) prevBtn.addEventListener("click", () => goWizardStep((activeReel()?.wizardStep ?? 0) - 1));
      if (skipBtn) skipBtn.addEventListener("click", () => goWizardStep(2));

      panel.querySelectorAll(".wizard-dot").forEach((d) => {

          if (target >= 1 && !canAdvanceToStep1(r2)) { alert("請先填主題同揀／寫鉤子。"); return; }
          if (target >= 2 && !canAdvanceToStep2(r2)) { alert("先揀齊結構、角度、片長、字幕風格，同生成選項。"); return; }
          if (target === 3 && !canAdvanceToStep3(r2) && !r2.aiGeneratedAt) { alert("先生成完整內容，或撳「略過 AI」直接手動編輯。"); return; }
          if (target === 4 && !canAdvanceToStep4(r2)) { alert("先生成完整內容再出影片 prompt。"); return; }
          if (target === 5 && !canAdvanceToStep5(r2)) { alert("先確認影片 prompt。"); return; }

      if (genHooksBtn) genHooksBtn.addEventListener("click", regenerateHooks);

      const asmBtn = panel.querySelector("#assemble-caption");

    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportJson() {
      downloadFile(

          exportedAt: new Date().toISOString(),
          schemaVersion: SCHEMA_VERSION,
          app: "jessi-reels-studio",
          data: state
        }, null, 2),
        "application/json"
      );
    }

    function importJsonFile(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result));
          const incoming = parsed.data && typeof parsed.data === "object" ? parsed.data : parsed;
          if (!incoming || typeof incoming !== "object" || Array.isArray(incoming)) {
            throw new Error("JSON 必須包含 data 物件。");
          }
          if (!confirm("覆蓋現有數據？匯入後會重新載入頁面。")) return;
          saveReels(normalize(incoming));
          location.reload();
        } catch (error) {
          alert("JSON 匯入失敗：" + (error.message || "格式不正確"));
        } finally {
          event.target.value = "";
        }
      };
      reader.readAsText(file);
    }

    });
    renderBackupPanel();

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("jessi-workflow-sw.js").then((reg) => {
        reg.addEventListener("updatefound", () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener("statechange", () => {
            if (nw.state === "installed" && navigator.serviceWorker.controller) {
              showToast("有新版本，重新整理生效（撳呢度 reload）", "update");
              const t = document.getElementById("app-toast");
              if (t) t.onclick = () => location.reload();
            }
          });
        });
      }).catch(() => {});
      // 定期檢查更新（每 60 分鐘）
      setInterval(() => {
        navigator.serviceWorker.getRegistration().then((reg) => { if (reg) reg.update(); }).catch(() => {});
      }, 60 * 60 * 1000);
    }
  </script>
</body>
</html>
